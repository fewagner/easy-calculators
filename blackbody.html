<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackbody Radiation Calculator</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .converter {
      background: white;
      padding: 1.5em;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label, input, button {
      display: block;
      width: 100%;
      margin-top: 1em;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 0.7em;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
    }
    .result {
      margin-top: 1em;
      font-weight: bold;
      text-align: center;
    }
    .card {
      background: white;
      padding: 1.5em;
      margin: 1em;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    .card a {
      text-decoration: none;
      font-size: 1.2em;
      color: #0077cc;
    }
    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="converter">
    <h2>Blackbody Radiation Spectrum</h2>

    <label for="temperature">Temperature (K):</label>
    <input type="number" id="temperature" placeholder="e.g., 3000" step="any">

    <button onclick="plotBlackbodySpectrum()">Plot Spectrum</button>

    <div id="plot"></div>
    <div class="result" id="blackbody-info"></div>
  </div>

  <script>
    function plotBlackbodySpectrum() {
      const T = parseFloat(document.getElementById('temperature').value);
      if (isNaN(T) || T <= 0) {
        alert("Please enter a valid positive temperature in Kelvin.");
        return;
      }

      const h = 6.62607015e-34;
      const c = 2.99792458e8;
      const kB = 1.380649e-23;
      const sigma = 5.670374419e-8;

      // Wien's displacement law in frequency: nu_peak = 2.82144 * kB * T / h
      const freqPeak = 2.821439372 * kB * T / h;
      const lambdaPeak = c / freqPeak;
      const energyPeak_eV = (h * freqPeak) / 1.602176634e-19;
      const totalRadiatedPower = sigma * Math.pow(T, 4);

      const frequencies = [];
      const radiances = [];

      const freqMin = 0.01 * freqPeak;
      const freqMax = 5 * freqPeak;
      const N = 500;
      const step = (freqMax - freqMin) / N;

      for (let nu = freqMin; nu <= freqMax; nu += step) {
        const B = (2 * h * nu**3 / c**2) / (Math.exp(h * nu / (kB * T)) - 1);
        frequencies.push(nu);
        radiances.push(B);
      }

      const trace = {
        x: frequencies,
        y: radiances,
        type: 'scatter',
        mode: 'lines',
        name: `T = ${T} K`
      };

      const layout = {
        title: `Blackbody Radiation Spectrum (T = ${T} K)`,
        xaxis: { title: 'Frequency (Hz)', range: [freqMin, freqMax] },
        yaxis: { title: 'Spectral Radiance (W·sr⁻¹·m⁻²·Hz⁻¹)' }
      };

      Plotly.newPlot('plot', [trace], layout);

      document.getElementById('blackbody-info').innerHTML = `
        Peak Frequency (νₚ): ${freqPeak.toExponential(6)} Hz<br>
        Corresponding Wavelength (c/νₚ): ${lambdaPeak.toExponential(6)} m<br>
        Energy at Peak: ${energyPeak_eV.toExponential(6)} eV<br>
        Total Radiated Power: ${totalRadiatedPower.toExponential(6)} W/m²
      `;
    }
  </script>
  <div class="card">
    <a href="index.html">Back</a>
  </div>
</body>
</html>
